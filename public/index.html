<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ── Auth screen ── -->
  <div id="auth-screen" class="hidden">
    <div class="auth-panel">
      <div id="auth-form">
        <h2 id="auth-title">Welcome Back</h2>
        <p class="auth-sub" id="auth-sub"></p>
        <div id="auth-name-row" class="form-row-two hidden">
          <div class="field-wrap"><label>First name</label><input id="auth-first" type="text" autocomplete="given-name" /></div>
          <div class="field-wrap"><label>Last name</label><input id="auth-last" type="text" autocomplete="family-name" /></div>
        </div>
        <div class="field-wrap"><label>Username</label><input id="auth-username" type="text" autocomplete="username" /></div>
        <div class="field-wrap"><label>Password</label><input id="auth-password" type="password" autocomplete="current-password" /></div>
        <div id="auth-error" class="field-error hidden"></div>
        <button id="auth-submit" class="btn-primary">Sign In</button>
      </div>
    </div>
  </div>

  <!-- ── App shell ── -->
  <div id="app" class="hidden">


    <div id="body-wrap">

      <!-- ── Nav Sidebar ── -->
      <nav id="nav-sidebar">
        <button class="nav-item nav-item--active" data-view="home" id="nav-home">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 18v-6h6v6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" data-view="library" id="nav-library">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="3" width="7" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="3" width="7" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="10" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="14" width="7" height="3" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
          <span class="nav-label">My Library</span>
        </button>
        <button class="nav-item" data-view="search" id="nav-search">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M15 15l-3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span class="nav-label">Browse</span>
        </button>
        <button class="nav-item" data-view="emulators" id="nav-emulators">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="11" rx="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M7 10.5h2m-1-1v2M13 10.5h.01M15 10.5h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span class="nav-label">Emulators</span>
        </button>
        <button class="nav-item" data-view="hosted" id="nav-hosted">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="3" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 7h2M6 10h2M10 7h4M10 10h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 15v2M13 15v2M5 17h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span class="nav-label">Hosted</span>
        </button>
        <button class="nav-item" data-view="controls" id="nav-controls">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="11" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M7 10.5h2M8 9.5v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="13" cy="10.5" r="1" fill="currentColor"/><circle cx="15" cy="10.5" r="1" fill="currentColor"/></svg>
          <span class="nav-label">Controls</span>
        </button>
        <div class="nav-spacer"></div>
        <div class="user-avatar-wrap nav-profile" id="user-avatar-wrap">
          <button class="user-avatar-btn nav-item nav-profile-btn" id="user-avatar-btn">
            <div class="user-avatar" id="user-avatar">?</div>
            <span class="nav-label nav-profile-name" id="user-username-nav"></span>
          </button>
          <div class="user-dropdown hidden" id="user-dropdown">
            <div class="user-dropdown-header">
              <div class="user-avatar user-avatar--lg" id="user-avatar-lg">?</div>
              <div>
                <div class="user-full-name" id="user-full-name"></div>
                <div class="user-username" id="user-username"></div>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-stats" id="dd-library-stats">Loading…</div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item hidden" id="dd-admin">
              <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M10 2a8 8 0 1 0 0 16A8 8 0 0 0 10 2zm0 3a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm0 10a6 6 0 0 1-5-2.69c.02-1.66 3.33-2.57 5-2.57s4.98.91 5 2.57A6 6 0 0 1 10 15z" fill="currentColor"/></svg>
              Admin Panel
            </button>
            <button class="dropdown-item" id="dd-personalize">
              <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="currentColor"/></svg>
              Personalize
            </button>
            <div id="dd-color-picker" class="dd-color-picker hidden">
              <div class="dd-color-label">Profile Color</div>
              <div class="dd-color-swatches">
                <button class="dd-swatch" data-color="#00d8ff" data-s-sw="#00d8ff" title="Cyan"></button>
                <button class="dd-swatch" data-color="#d0ff00" data-s-sw="#d0ff00" title="Lime"></button>
                <button class="dd-swatch" data-color="#ff00e1" data-s-sw="#ff00e1" title="Magenta"></button>
                <button class="dd-swatch" data-color="#00ff18" data-s-sw="#00ff18" title="Green"></button>
                <button class="dd-swatch" data-color="#ff0000" data-s-sw="#ff0000" title="Red"></button>
                <button class="dd-swatch" data-color="#ff8c00" data-s-sw="#ff8c00" title="Orange"></button>
                <button class="dd-swatch dd-swatch--rainbow" data-color="rainbow" title="All Colors"></button>
              </div>
            </div>
            <button class="dropdown-item" id="dd-help">
              <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M10 14v-1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10 11c0-2 3-2 3-4a3 3 0 1 0-6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Help
            </button>
            <button class="dropdown-item" id="dd-leave">
              <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M13 3H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8M17 10H7m0 0 3-3m-3 3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Leave to Hub
            </button>
          </div>
        </div>
      </nav>

      <!-- ── Main Content ── -->
      <main id="main-content">

        <!-- Home View -->
        <div class="view active" data-view="home" id="view-home">
          <div id="hero-banner">
            <div id="hero-bg"></div>
            <div id="hero-gradient"></div>
            <div id="hero-info">
              <div id="hero-status-badge" class="hidden"></div>
              <h1 id="hero-title"></h1>
              <p id="hero-description"></p>
              <div id="hero-meta"></div>
              <div id="hero-actions">
                <button id="hero-detail-btn" class="btn-hero-primary">More Info</button>
                <button id="hero-play-btn" class="btn-hero-lib">+ Add to Library</button>
              </div>
            </div>
            <div id="hero-dots"></div>
            <button id="hero-prev" class="hero-arrow hero-arrow--left">&#8249;</button>
            <button id="hero-next" class="hero-arrow hero-arrow--right">&#8250;</button>
          </div>
          <div class="view-inner">
            <div id="shelves-container"></div>
          </div>
        </div>

        <!-- Library View -->
        <div class="view" data-view="library" id="view-library">
          <div class="view-inner">
            <div class="view-header">
              <h2 class="view-title">My <span class="neon-letter" data-s-nl="#00d8ff">L</span><span class="neon-letter" data-s-nl="#d0ff00">I</span><span class="neon-letter" data-s-nl="#ff00e1">B</span><span class="neon-letter" data-s-nl="#00ff18">R</span><span class="neon-letter" data-s-nl="#ff0000">A</span><span class="neon-letter" data-s-nl="#ff8c00">R</span><span class="neon-letter" data-s-nl="#00d8ff">Y</span></h2>
            </div>
            <div id="library-filter-tabs">
              <button class="lib-tab active" data-status="">All</button>
              <button class="lib-tab" data-status="playing">Playing</button>
              <button class="lib-tab" data-status="backlog">Backlog</button>
              <button class="lib-tab" data-status="completed">Completed</button>
              <button class="lib-tab" data-status="dropped">Dropped</button>
            </div>
            <div id="library-stats-bar"></div>
            <div id="library-grid" class="game-grid"></div>
          </div>
        </div>

        <!-- Browse / Search View -->
        <div class="view" data-view="search" id="view-search">
          <div class="view-inner">
            <div class="view-header">
              <h2 class="view-title">Browse our <span class="neon-letter" data-s-nl="#00d8ff">G</span><span class="neon-letter" data-s-nl="#d0ff00">A</span><span class="neon-letter" data-s-nl="#ff00e1">M</span><span class="neon-letter" data-s-nl="#00ff18">E</span><span class="neon-letter" data-s-nl="#ff8c00">S</span></h2>
              <div class="search-wrap mt-12">
                <svg class="search-icon" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#00d8ff" stroke-width="1.5"/><path d="M15 15l-3-3" stroke="#00d8ff" stroke-width="1.5" stroke-linecap="round"/></svg>
                <input type="text" id="search-input" placeholder="Search games…" autocomplete="off" />
              </div>
            </div>
            <div id="browse-filters">
              <div id="genre-filter-strip" class="filter-strip"></div>
              <div id="platform-filter-strip" class="filter-strip"></div>
            </div>
            <div id="search-results-grid" class="game-grid"></div>
          </div>
        </div>

        <!-- Emulators View -->
        <div class="view" data-view="emulators" id="view-emulators">
          <div class="view-inner">
            <div class="view-header">
              <h2 class="view-title"><span class="neon-letter" data-s-nl="#00d8ff">E</span><span class="neon-letter" data-s-nl="#d0ff00">M</span><span class="neon-letter" data-s-nl="#ff00e1">U</span><span class="neon-letter" data-s-nl="#00ff18">L</span><span class="neon-letter" data-s-nl="#ff0000">A</span><span class="neon-letter" data-s-nl="#ff8c00">T</span><span class="neon-letter" data-s-nl="#00d8ff">O</span><span class="neon-letter" data-s-nl="#d0ff00">R</span><span class="neon-letter" data-s-nl="#ff00e1">S</span></h2>
            </div>
            <div id="emulators-content"></div>
          </div>
        </div>

        <!-- Hosted Servers View -->
        <div class="view" data-view="hosted" id="view-hosted">
          <div class="view-inner">
            <div class="view-header">
              <h2 class="view-title"><span class="neon-letter" data-s-nl="#00d8ff">H</span><span class="neon-letter" data-s-nl="#d0ff00">O</span><span class="neon-letter" data-s-nl="#ff00e1">S</span><span class="neon-letter" data-s-nl="#00ff18">T</span><span class="neon-letter" data-s-nl="#ff0000">E</span><span class="neon-letter" data-s-nl="#ff8c00">D</span> <span class="neon-letter" data-s-nl="#00d8ff">S</span><span class="neon-letter" data-s-nl="#d0ff00">E</span><span class="neon-letter" data-s-nl="#ff00e1">R</span><span class="neon-letter" data-s-nl="#00ff18">V</span><span class="neon-letter" data-s-nl="#ff0000">E</span><span class="neon-letter" data-s-nl="#ff8c00">R</span><span class="neon-letter" data-s-nl="#00d8ff">S</span></h2>
            </div>
            <div id="hosted-grid" class="hosted-grid"></div>
          </div>
        </div>

        <!-- Controls View -->
        <div class="view" data-view="controls" id="view-controls">
          <div class="view-inner">
            <div class="view-header">
              <h2 class="view-title"><span class="neon-letter" data-s-nl="#bf00ff">C</span><span class="neon-letter" data-s-nl="#00d8ff">O</span><span class="neon-letter" data-s-nl="#d0ff00">N</span><span class="neon-letter" data-s-nl="#ff00e1">T</span><span class="neon-letter" data-s-nl="#00ff18">R</span><span class="neon-letter" data-s-nl="#ff0000">O</span><span class="neon-letter" data-s-nl="#ff8c00">L</span><span class="neon-letter" data-s-nl="#bf00ff">S</span></h2>
            </div>
            <div id="controls-content"></div>
          </div>
        </div>

        <!-- Admin View -->
        <div class="view" data-view="admin" id="view-admin">
          <div class="view-inner">

            <!-- Admin Home -->
            <div id="games-admin-home">
              <div class="games-admin-header">
                <span class="games-admin-badge">ADMINISTRATOR</span>
                <h1 class="games-admin-title">Admin Panel</h1>
                <p class="games-admin-subtitle">Manage the game catalog, genres, platforms, and hosted servers.</p>
              </div>
              <div class="games-admin-nav-grid">
                <button class="games-admin-nav-card" data-atab="catalog" data-s-card-neon="#00d8ff">
                  <span class="games-admin-nav-icon">&#9632;</span>
                  <span class="games-admin-nav-title">Catalog</span>
                  <span class="games-admin-nav-desc">Browse and manage all games in the library</span>
                  <span class="games-admin-nav-arrow">&#8594;</span>
                </button>
                <button class="games-admin-nav-card" data-atab="add-game" data-s-card-neon="#d0ff00">
                  <span class="games-admin-nav-icon">&#9632;</span>
                  <span class="games-admin-nav-title">Add Game</span>
                  <span class="games-admin-nav-desc">Add a new game manually or fetch from RAWG</span>
                  <span class="games-admin-nav-arrow">&#8594;</span>
                </button>
                <button class="games-admin-nav-card" data-atab="genres" data-s-card-neon="#ff00e1">
                  <span class="games-admin-nav-icon">&#9632;</span>
                  <span class="games-admin-nav-title">Genres</span>
                  <span class="games-admin-nav-desc">Add and remove genre tags for filtering</span>
                  <span class="games-admin-nav-arrow">&#8594;</span>
                </button>
                <button class="games-admin-nav-card" data-atab="platforms" data-s-card-neon="#00ff18">
                  <span class="games-admin-nav-icon">&#9632;</span>
                  <span class="games-admin-nav-title">Platforms</span>
                  <span class="games-admin-nav-desc">Manage platform tags used across the catalog</span>
                  <span class="games-admin-nav-arrow">&#8594;</span>
                </button>
                <button class="games-admin-nav-card" data-atab="hosted-servers" data-s-card-neon="#ff8c00">
                  <span class="games-admin-nav-icon">&#9632;</span>
                  <span class="games-admin-nav-title">Hosted Servers</span>
                  <span class="games-admin-nav-desc">Configure and manage multiplayer game servers</span>
                  <span class="games-admin-nav-arrow">&#8594;</span>
                </button>
              </div>
            </div>

            <!-- Admin Sub-panels -->
            <div id="games-admin-sub" class="hidden">
              <div class="games-admin-sub-header">
                <button class="games-admin-back-btn" id="games-admin-back">&#8592; Back</button>
                <h2 class="games-admin-sub-title" id="games-admin-sub-title"></h2>
              </div>
              <div id="admin-tab-catalog" class="admin-tab-panel hidden">
                <div id="admin-game-table-wrap"></div>
              </div>
              <div id="admin-tab-add-game" class="admin-tab-panel hidden">
                <div id="admin-game-form"></div>
              </div>
              <div id="admin-tab-genres" class="admin-tab-panel hidden">
                <div id="admin-genres-list"></div>
                <div class="admin-add-row">
                  <input type="text" id="genre-input" placeholder="Genre name…" />
                  <button class="btn btn-accent" id="genre-add-btn">Add</button>
                </div>
              </div>
              <div id="admin-tab-platforms" class="admin-tab-panel hidden">
                <div id="admin-platforms-list"></div>
                <div class="admin-add-row">
                  <input type="text" id="platform-input" placeholder="Platform name…" />
                  <button class="btn btn-accent" id="platform-add-btn">Add</button>
                </div>
              </div>
              <div id="admin-tab-hosted-servers" class="admin-tab-panel hidden">
                <div id="admin-hosted-list"></div>
                <div class="admin-add-row admin-add-row--wrap">
                  <input type="text" id="hosted-name-input" placeholder="Server name…" />
                  <input type="text" id="hosted-host-input" placeholder="Host / IP…" />
                  <input type="number" id="hosted-port-input" placeholder="Port" value="25565" />
                  <input type="text" id="hosted-start-input" placeholder="Start command…" />
                  <input type="text" id="hosted-stop-input" placeholder="Stop command…" />
                  <input type="text" id="hosted-desc-input" placeholder="Description (optional)…" />
                  <input type="text" id="hosted-image-input" placeholder="Image path (e.g. img/servers/vanilla.jpg)…" />
                  <input type="text" id="hosted-config-input" placeholder="server.properties path (absolute)…" />
                  <button class="btn btn-accent" id="hosted-add-btn">Add</button>
                </div>
              </div>
            </div>

          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- ── Game Detail Modal ── -->
  <div id="game-detail-modal" class="modal-overlay hidden">
    <div class="modal-box modal-box--game">
      <button id="modal-library-btn" class="modal-library-btn">+ Add to Library</button>
      <button id="modal-close" class="modal-close">&#x2715;</button>
      <div id="modal-hero-wrap">
        <img id="modal-hero-img" src="" alt="" />
        <div id="modal-hero-gradient"></div>
      </div>
      <div class="modal-body">
        <div class="modal-info-col">
          <div class="modal-title-row">
            <h2 id="modal-title"></h2>
            <div id="modal-metacritic-badge" class="hidden"></div>
          </div>
          <div id="modal-playtime-inline" class="modal-playtime-inline"></div>
          <div id="modal-meta-row" class="modal-meta-row"></div>
          <div id="modal-chips-row" class="modal-chips-row"></div>
          <p id="modal-description"></p>
          <div id="modal-trailer" class="hidden">
            <div class="modal-section-title">Trailer</div>
            <div class="modal-trailer-wrap">
              <iframe id="modal-trailer-iframe" frameborder="0" allowfullscreen></iframe>
            </div>
          </div>
        </div>
        <div class="modal-controls-col">
          <div class="modal-play-top">
            <button class="btn-modal-play" id="modal-play-btn">
              <span data-s-nl="#00d8ff">P</span><span data-s-nl="#d0ff00">l</span><span data-s-nl="#ff00e1">a</span><span data-s-nl="#00ff18">y</span><span data-s-nl="#ff0000">G</span><span data-s-nl="#bf00ff">a</span><span data-s-nl="#ff6a00">m</span><span data-s-nl="#00ffff">e</span>
            </button>
            <div id="modal-session-controls"></div>
          </div>
          <div class="modal-section modal-reviews-box" id="modal-reviews-section">
            <div class="modal-section-title">Reviews</div>
            <div id="modal-reviews-list"></div>
            <div class="modal-review-form-wrap" id="modal-review-form">
              <div class="field-wrap">
                <label>Your Review</label>
                <textarea id="modal-review-body" rows="3" placeholder="Write a review…"></textarea>
              </div>
              <div class="star-rating star-rating-center" id="modal-review-stars"></div>
              <div class="flex-center-gap">
                <button class="btn btn-accent btn-sm" id="modal-review-submit">Post Review</button>
                <button class="btn btn-danger btn-sm hidden" id="modal-review-delete">Delete Review</button>
              </div>
            </div>
          </div>
          <div class="modal-section" id="modal-playtime-section">
            <div class="modal-section-title">Playtime</div>
            <div id="modal-playtime-total" class="playtime-total"></div>
            <div id="modal-session-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Emulator Player Overlay ── -->
  <div id="emulator-overlay" class="hidden">
    <div id="emulator-header">
      <span id="emulator-title"></span>
      <button id="emulator-close">&#x2715;</button>
    </div>
    <iframe id="emulator-frame" src="" allowfullscreen></iframe>
  </div>

  <!-- ── Toast container ── -->
  <div id="toast-container"></div>

  <script src="/app.js"></script>
</body>
</html>
