<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Emulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
    #game { width: 100%; height: 100%; }
    #emu-controls {
      position: fixed; top: 12px; left: 12px;
      display: flex; gap: 8px; z-index: 9999;
      opacity: 0.2; transition: opacity 200ms ease;
      cursor: default;
    }
    #emu-controls:hover { opacity: 1; cursor: default; }
    .emu-btn {
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(0,216,255,0.4);
      color: #00d8ff;
      font-size: 11px; font-weight: 700; font-family: sans-serif;
      letter-spacing: .08em; text-transform: uppercase;
      padding: 6px 12px; border-radius: 5px;
      cursor: pointer; backdrop-filter: blur(8px);
      transition: all 150ms ease;
    }
    .emu-btn:hover {
      border-color: #00d8ff;
      box-shadow: 0 0 10px rgba(0,216,255,0.5);
      text-shadow: 0 0 6px #00d8ff;
    }
    .emu-btn--green { border-color: rgba(0,255,24,0.4); color: #00ff18; }
    .emu-btn--green:hover { border-color: #00ff18; box-shadow: 0 0 10px rgba(0,255,24,0.5); text-shadow: 0 0 6px #00ff18; }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="emu-controls">
    <button class="emu-btn emu-btn--green" id="emu-play">▶ Play</button>
    <button class="emu-btn" id="emu-pause">⏸ Pause</button>
    <button class="emu-btn" id="emu-qsave">💾 Save</button>
    <button class="emu-btn" id="emu-qload">⏪ Load</button>
  </div>
  <script>
    // Filter the Gamepad API so only user-configured buttons/axes pass through to EmulatorJS.
    // Must override Navigator.prototype (not the navigator instance) to work in Chrome/Firefox.
    (function () {
      const allowed    = JSON.parse(localStorage.getItem('emu_allowed_inputs') || '{"buttons":[],"axes":[]}');
      const allowedBtns = new Set(allowed.buttons);
      const allowedAxes = new Set(allowed.axes);
      const _get = Navigator.prototype.getGamepads;
      Navigator.prototype.getGamepads = function () {
        return _get.call(this).map(gp => {
          if (!gp) return gp;
          return new Proxy(gp, {
            get(target, prop) {
              if (prop === 'buttons') {
                return target.buttons.map((b, i) =>
                  allowedBtns.has(i) ? b : { pressed: false, touched: false, value: 0 }
                );
              }
              if (prop === 'axes') {
                return target.axes.map((v, i) => allowedAxes.has(i) ? v : 0);
              }
              return target[prop];
            }
          });
        });
      };
    })();
  </script>
  <script>
    const params = new URLSearchParams(window.location.search);
    window.EJS_player        = '#game';
    window.EJS_core          = params.get('core') || 'nes';
    window.EJS_gameUrl       = params.get('rom');
    window.EJS_pathtodata    = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_startOnLoaded = true;
    // Disable RetroArch's gamepad menu-toggle combo so the ✕ button (or any combo)
    // doesn't accidentally open the menu and pause the game.
    // 0 = disabled, 1 = Start+Select, 2 = L+R+Start+Select, etc.
    window.EJS_defaultOptions = {
      'input_menu_toggle_gamepad_combo': '0',
      'input_quit_gamepad_combo':        '0',
      'input_enable_hotkey_btn':         '8',            // gamepad: must hold Share for any hotkey
      'input_enable_hotkey':             'scroll_lock',  // keyboard: must hold Scroll Lock for any hotkey
      // Explicitly unmap pause and menu toggles so no stray button triggers them
      'input_pause_toggle':              'nul',
      'input_pause_toggle_btn':          'nul',
      'input_menu_toggle':               'nul',
      'input_menu_toggle_btn':           'nul',
    };
    // Apply any button remaps configured in the Controls view
    try {
      const remaps = JSON.parse(localStorage.getItem('emu_input_opts') || 'null');
      if (remaps) Object.assign(window.EJS_defaultOptions, remaps);
    } catch {}
    window.EJS_Buttons = {
      playPause:     { visible: false },
      restart:       { visible: false },
      mute:          { visible: false },
      volume:        { visible: false },
      saveState:     { visible: false },
      loadState:     { visible: false },
      quickSave:     { visible: false },
      quickLoad:     { visible: false },
      screenshot:    { visible: false },
      screenRecord:  { visible: false },
      gamepad:       { visible: true },
      cheat:         { visible: false },
      cacheManager:  { visible: false },
      saveSavFiles:  { visible: false },
      loadSavFiles:  { visible: false },
      fullscreen:    { visible: true },
      exitEmulation: { visible: true, callback: () => { if (confirm('Quit the emulator?')) window.close(); } },
      settings:      { visible: true },
    };

    const HIDDEN_TABS = ['core', 'backend', 'screen capture', 'screen record'];

    window.EJS_ready = function() {
      document.addEventListener('contextmenu', e => e.preventDefault(), true);

      document.getElementById('emu-play').addEventListener('click',  () => window.EJS_emulator.play());
      document.getElementById('emu-pause').addEventListener('click', () => window.EJS_emulator.pause());
      document.getElementById('emu-qsave').addEventListener('click', () => window.EJS_emulator.gameManager.quickSave(1));
      document.getElementById('emu-qload').addEventListener('click', () => window.EJS_emulator.gameManager.quickLoad(1));

      // Returns true if any connected gamepad's state changed within the last `ms` milliseconds.
      // Uses gamepad.timestamp (a DOMHighResTimeStamp from performance.now()) which updates
      // any time a button or axis changes — more reliable than checking button.pressed at
      // the exact moment of a keydown event, since the button may already be released by then.
      const recentGamepadInput = (ms = 200) => {
        if (!navigator.getGamepads) return false;
        const now = performance.now();
        return Array.from(navigator.getGamepads()).some(gp => gp && (now - gp.timestamp) < ms);
      };

      // Disable mouse input on the game canvas while a gamepad is actively being used.
      // Uses requestAnimationFrame instead of setInterval for accurate per-frame sampling.
      let gpMouseActive = false;
      let gpMouseTimeout = null;
      const game = document.getElementById('game');
      const blockMouse = e => { if (gpMouseActive) e.stopImmediatePropagation(); };
      ['mousedown', 'mouseup', 'mousemove', 'click'].forEach(t => game.addEventListener(t, blockMouse, true));
      (function pollGamepad() {
        if (recentGamepadInput(100)) {
          gpMouseActive = true;
          clearTimeout(gpMouseTimeout);
          gpMouseTimeout = setTimeout(() => { gpMouseActive = false; }, 2000);
        }
        requestAnimationFrame(pollGamepad);
      })();

      // Watch for settings panel: hide unwanted tabs
      const observer = new MutationObserver(() => {
        document.querySelectorAll('.ejs_settings_main_bar > *, .ejs_setting_menu > *').forEach(el => {
          const txt = el.textContent.trim().toLowerCase();
          if (HIDDEN_TABS.some(t => txt.startsWith(t))) el.style.display = 'none';
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });
    };
  </script>
  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
